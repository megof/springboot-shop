<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Document</title>
</head>
<body>
    <h1>Tomcat iniciado, corriendo correctamente</h1>
    <span th:text="${name}">
        <h6 th:text="${lastname}"></h6>
    </span>
    <h6 th:text="${name}">Name</h6>
    <h6 th:text="${lastname}"></h6>
    <span th:text="${date}">
        <h6 th:text="${time}"></h6>
    </span>
    <h6 th:text="${date}"></h6>    
    <h6 th:text="${time}">Time</h6>

    <h6 th:text="${nameu}">NameU</h6>    
    <h6 th:if="${1 == 1}" th:text="${lastnameu}">LastnameU</h6>
    <h6 th:text="${user}">User</h6>

    
    <div th:if="${usrs.isEmpty()}" th:text="${'Lista global vacía por el momento, vuelve más tarde :)'}"></div>
    <table th:if="${!(usrs.isEmpty())}" border="1px">
        <thead align="center">
            <th>Name</th>
            <th>LastName</th>
            <th>Count</th>
        </thead>
        <tbody align="center">
            <tr th:each="usr: ${usrs}">
                <td th:text="${usr.name}"></td>
                <td th:text="${usr.lastname}"></td>
                <td th:text="${usr.count}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
